name: ✨ Feature request
description: Suggest a new feature or improvement
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying need. Not the solution — the problem.
      placeholder: "I want to verify that skeptic verdicts don't drift between rounds."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What solution would you like?
      description: A clear description of what you'd like Goalpower to do.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches you thought about, and why they don't work for you.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant — screenshots, links to other tools, etc.
