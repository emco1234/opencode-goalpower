name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify clean typecheck before release
        run: bun run typecheck

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build release notes from CHANGELOG.md
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Extract the section for this version from CHANGELOG.md using awk.
          # Robust against regex escaping issues — no Node eval needed.
          VERSION_NUM="${VERSION#v}"
          awk -v v="$VERSION_NUM" '
            $0 ~ "^## \\[" v "\\]" { in_section=1; print; next }
            /^## \[/ { if (in_section) exit }
            in_section { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG.md entry for version $VERSION_NUM"
            exit 1
          fi
          echo "Release notes preview:"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
